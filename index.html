<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌈ひかりの実践すごろくDX</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:"Hiragino Maru Gothic ProN",sans-serif;
    background:linear-gradient(to bottom,#fff6e9,#e8f7ff);
    color:#444;
    text-align:center;
}

h1{
    color:#ff66a3;
    margin-bottom:10px;
}

.subtitle{
    line-height:1.7;
    margin-bottom:20px;
    font-size:15px;
}

.controls{
    margin-top:10px;
    margin-bottom:20px;
}

button{
    font-size:22px;
    padding:14px 30px;
    border:none;
    border-radius:14px;
    background:#ffb84d;
    color:white;
    cursor:pointer;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.info{
    margin-top:15px;
    margin-bottom:20px;
    font-size:20px;
    line-height:1.8;
}

.eventBox{
    margin-top:20px;
    background:white;
    max-width:900px;
    margin-left:auto;
    margin-right:auto;
    padding:25px;
    border-radius:18px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    margin-bottom:25px;
}

.goal{
    margin-top:20px;
    margin-bottom:25px;
    font-size:28px;
    color:#ff6699;
    line-height:1.8;
    font-weight:bold;
}

.board{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    max-width:1200px;
    margin:0 auto;
}

.cell{
    background:white;
    border-radius:18px;
    padding:12px;
    min-height:210px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    transition:0.3s;
    position:relative;
}

.cell.active{
    background:#fff3cd;
    border:4px solid #ffb84d;
    transform:scale(1.03);
}

.number{
    font-size:13px;
    color:#888;
    margin-bottom:6px;
}

.name{
    font-size:17px;
    font-weight:bold;
    color:#ff6699;
    margin-bottom:8px;
}

.desc{
    font-size:12px;
    line-height:1.7;
}

.footer{
    margin-top:30px;
    color:#666;
    line-height:1.8;
    font-size:13px;
}

@media(max-width:900px){

    .board{
        grid-template-columns:repeat(2,1fr);
    }

}

@media(max-width:600px){

    .board{
        grid-template-columns:1fr;
    }

    .cell{
        min-height:auto;
    }

    button{
        width:100%;
    }

}

</style>
</head>

<body>

<h1>🌈ひかりの実践すごろくDX</h1>

<div class="subtitle">
遊びながら整う😊<br>
潜在意識・ヒーリング・感謝・浄化を<br>
やさしく実践する1人用すごろく✨
</div>

<!-- サイコロボタンを上へ -->
<div class="controls">
    <button onclick="rollDice()">🎲 サイコロをふる</button>
</div>

<!-- 情報表示 -->
<div class="info">
現在位置：<span id="position">START</span><br>
ひかりポイント：⭐<span id="points">0</span>
</div>

<!-- 今回のイベントを上へ -->
<div class="eventBox">
    <h2>✨今回のイベント</h2>
    <div id="eventText">
        サイコロをふってスタート😊
    </div>
</div>

<!-- ゴール表示も上へ -->
<div class="goal" id="goalText"></div>

<!-- すごろく盤面 -->
<div class="board" id="board"></div>

<div class="footer">
🌿 「やらなきゃ」ではなく<br>
「ちょっと軽くなる」「少し整う」を大切に😊
</div>

<script>

const cells = [

{
name:"START",
desc:"ゲーム開始😊"
},

{
name:"ありがとうございます",
desc:"ちょっと、調子が悪いので、ありがとうございますを何回か唱えて整えよう。今日ありがとうございますは、神おわしますという、波動を整える言葉ですよね"
},

{
name:"食べ物浄化",
desc:"飲み物や食べ物が目の前にある！宇宙エネルギーで浄化しましょう。宇宙エネルギーが使えることに感謝"
},

{
name:"身体ヒーリング",
desc:"身体が痛い、、、身体をさわり、右回転宇宙エネルギー痛みをとるでヒーリングしましょう。不思議と温かくなります"
},

{
name:"深呼吸の森",
desc:"ゆっくり深呼吸を3回"
},

{
name:"土地ありがとう",
desc:"家や部屋に右回転宇宙エネルギーで浄化しましょうありがとうを言う"
},

{
name:"天使さんお願い",
desc:"電車に乗る5分前に良い席に座れますようにお願いしたらすわれた！不思議！"
},

{
name:"松果体キラリ",
desc:"イシリスの松果体活性化をしてピンときやすくなった！"
},

{
name:"整えタイム",
desc:"なんかおかしいなと思ったときにイシリスや宇宙エネルギーを三回となえて正気を取り戻した"
},

{
name:"なんか不安なとき",
desc:"不安の潜在意識の修復と変換をしよう"
},

{
name:"家族からのヘルプ",
desc:"家族から自信がない！と言ってきました！遠隔で家族の自信がないの潜在意識の修復と変換をしよう"
},

{
name:"暇だからお金の大看板",
desc:"暇だな、、それなら、自分をレベルアップ！心と人と、経済、時間がレベルアップするお金の大看板の潜在意識の修復と変換をしよう"
},

{
name:"パートナーとけんか",
desc:"パートナーとけんかしちゃった、、、自分の癖やパートナーの癖の鏡を洗い出して、恋愛の大看板の潜在意識の修復と変換をしよう"
},

{
name:"時間がなくて重い",
desc:"時間がなくて重くてしょうがない場合は、イシリス高周波アロマのパヒュームを使おう！能力開発、やすらぎ、ストレス解消、人間関係、健康などのenergyを意識して、シュシュっとしてから宇宙に広がるイメージをし、自分の身体に入るイメージをしよう。不思議とスッキリ✨"
},

{
name:"GOAL",
desc:"今日の自分をいっぱいほめて終了✨"
}

];

let position = 0;
let points = 0;

const board = document.getElementById("board");

function createBoard(){

    board.innerHTML = "";

    cells.forEach((cell,index)=>{

        const div = document.createElement("div");

        div.className = "cell";

        if(index === position){
            div.classList.add("active");
        }

        div.innerHTML = `
            <div class="number">${index}</div>
            <div class="name">${cell.name}</div>
            <div class="desc">${cell.desc}</div>
        `;

        board.appendChild(div);

    });

}

function rollDice(){

    if(position >= cells.length - 1){
        return;
    }

    const dice = Math.random() < 0.5 ? 1 : 2;

    position += dice;

    if(position >= cells.length - 1){
        position = cells.length - 1;
    }

    points++;

    document.getElementById("points").innerText = points;

    if(position === 0){
        document.getElementById("position").innerText = "START";
    }
    else if(position === cells.length - 1){
        document.getElementById("position").innerText = "GOAL";
    }
    else{
        document.getElementById("position").innerText = position + "マス目";
    }

    document.getElementById("eventText").innerHTML = `
        🎲 <span style="font-size:28px;color:#ff6699;">${dice}</span> が出ました！<br><br>

        <div style="font-size:24px;color:#ff6699;font-weight:bold;">
            ${cells[position].name}
        </div>

        <br>

        <div style="line-height:2;font-size:16px;">
            ${cells[position].desc}
        </div>
    `;

    if(position >= cells.length - 1){

        document.getElementById("goalText").innerHTML = `
        🎉ゴール！🎉<br>

        今日の自分をいっぱいほめよう😊<br><br>

        「整えられてえらい✨」<br>
        「今日も進めた✨」<br>
        「少し軽くなった✨」
        `;
    }

    createBoard();

}

createBoard();

</script>

</body>
</html>
